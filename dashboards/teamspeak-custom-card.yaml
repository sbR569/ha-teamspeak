# Variante A: Custom Card (ts3.app-Look) — komplette Dashboard-Ansicht.
# Voraussetzung: www/teamspeak-viewer-card.js als Ressource eingebunden (s. README).
# Entity-IDs ggf. anpassen (Entwicklerwerkzeuge -> Zustände, nach "teamspeak" filtern).
title: TeamSpeak
path: teamspeak
icon: mdi:headset
cards:
  - type: glance
    title: Mein TeamSpeak
    entities:
      - entity: sensor.teamspeak_meinserver_status
        name: Status
      - entity: sensor.teamspeak_meinserver_online_seit
        name: Online seit
      - entity: sensor.teamspeak_meinserver_verbundene_clients
        name: Clients
      - entity: sensor.teamspeak_meinserver_maximale_clients
        name: Max
      - entity: sensor.teamspeak_meinserver_version
        name: Version

  - type: custom:teamspeak-viewer-card
    title: Mein TeamSpeak
    channels_entity: sensor.teamspeak_meinserver_kanale
    clients_entity: sensor.teamspeak_meinserver_verbundene_clients
    status_entity: sensor.teamspeak_meinserver_status
    max_clients_entity: sensor.teamspeak_meinserver_maximale_clients
    bans_entity: sensor.teamspeak_meinserver_aktive_banns
    show_spacers: true
    show_actions: true
    max_height: 560

  - type: history-graph
    title: Clients (24 h)
    hours_to_show: 24
    entities:
      - sensor.teamspeak_meinserver_verbundene_clients
