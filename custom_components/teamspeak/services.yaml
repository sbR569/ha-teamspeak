create_channel:
  fields:
    config_entry_id:
      required: false
      selector:
        config_entry:
          integration: teamspeak
    name:
      required: true
      example: "Lobby 2"
      selector:
        text:
    parent_id:
      required: false
      example: 103
      selector:
        number:
          min: 0
          mode: box
    topic:
      required: false
      selector:
        text:
    password:
      required: false
      selector:
        text:
    max_clients:
      required: false
      selector:
        number:
          min: 0
          mode: box
    channel_type:
      required: false
      default: permanent
      selector:
        select:
          options:
            - value: permanent
              label: "Permanent"
            - value: semi_permanent
              label: "Semi-permanent"
            - value: temporary
              label: "Temporary"

